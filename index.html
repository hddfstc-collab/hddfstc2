        function convertAccessControlID(tagId) {
            if (!tagId) return '';
            tagId = tagId.trim().toUpperCase();
            if (tagId.length >= 10 && /^[0-9A-F]+$/.test(tagId)) {
                const byte0 = tagId.substring(0, 2);
                const byte1 = tagId.substring(2, 4);
                const byte2 = tagId.substring(4, 6);
                const cardDec = parseInt(byte1 + byte0, 16);
                const facDec = parseInt(byte2, 16);
                if (!isNaN(cardDec) && !isNaN(facDec)) {
                    return facDec.toString().padStart(3, '0') + cardDec.toString().padStart(5, '0');
                }
            }
            return tagId;
        }
        window.convertAccessControlID = convertAccessControlID;

        function formatStock(total, base, bulk, ratio, hideTotal = false) {
            total = parseInt(total) || 0;
            if (!bulk || !ratio || ratio <= 1) return `${total}${base}`;
            const b = Math.floor(total / ratio);
            const p = total % ratio;
            let res = '';
            if (b > 0) res += `${b}${bulk} `;
            if (p > 0 || b === 0) res += `${p}${base}`;
            if (!hideTotal && b > 0) res += ` <span class="text-slate-400 text-sm ml-1 font-normal word-keep">(총 ${total}${base})</span>`;
            return res.trim();
        }

            let lowStockItems = [];
            
            state.inventory.forEach(item => {
                const totalStock = Object.values(item.stocks).reduce((sum, v) => sum + (parseInt(v) || 0), 0);
                const formatStr = window.formatStock(totalStock, item.unitBase, item.unitBulk, item.bulkRatio, true).replace(/<[^>]*>?/gm, '');
                body += `- ${item.name}: ${formatStr}\n`;
                
                if (totalStock <= (item.alertQty || 0)) {
                    lowStockItems.push(`${item.name} (잔여: ${formatStr}, 발주기준: ${item.alertQty}${item.unitBase} 이하)`);
                }
            });
            
            if (lowStockItems.length > 0) {
                body = "⚠️ [발주 요망 품목]\n" + lowStockItems.map(i => `- ${i}`).join('\n') + "\n\n====================\n\n" + body;

            const subject = encodeURIComponent(`[일일보고/발주알림] 창고 재고 현황 (${new Date().toISOString().split('T')[0]})`);
            window.location.href = `mailto:${state.settings.alertEmail}?subject=${subject}&body=${encodeURIComponent(body)}`;

        function executeConfirmAction() {
            if (!state.confirmModal) return;
            const { actionType, payload } = state.confirmModal;
            state.confirmModal = null; 

            if (actionType === 'deleteLog') {
                const idx = state.logs.findIndex(l => l.id == payload);
                if(idx > -1) {
                    const log = state.logs[idx];
                    const item = state.inventory.find(i => i.name === log.itemName);
                    if (item) {
                        if (item.stocks.counter === undefined) item.stocks.counter = 0;
                        item.stocks.counter += log.qty;
                    }
                    state.logs.splice(idx, 1); window.saveDataToStorage(); window.showMsg("기록이 삭제되고 재고가 복구되었습니다.");
                }
            } else if (actionType === 'cancelReservation') {
                const res = state.reservations.find(r => r.id == payload);
                if(res) {
                    res.cart.forEach(c => {
                        const item = state.inventory.find(i => i.id == c.itemId);
                        if(item && item.stocks.counter !== undefined) { item.stocks.counter += c.amount; }
                    });
                    res.status = 'cancelled';
                    if(state.pendingReservations) {
                        state.pendingReservations = state.pendingReservations.filter(p => p.id != payload);
                        if(state.pendingReservations.length === 0) state.pendingReservations = null;

                    window.saveDataToStorage(); window.showMsg("예약이 취소되고 재고가 정상 복구되었습니다.");

            } else if (actionType === 'deleteItem') {
                state.inventory = state.inventory.filter(i => i.id != payload);
                if (state.selectedAdminItemId == payload) state.selectedAdminItemId = null;
                window.saveDataToStorage(); window.showMsg("품목이 삭제되었습니다.");
            } else if (actionType === 'deleteCategory') {
                state.categories = state.categories.filter(c => c !== payload); window.saveDataToStorage(); window.showMsg("분류가 삭제되었습니다.");
            } else if (actionType === 'deleteStaff') {
                state.staffList.splice(payload, 1); window.saveDataToStorage(); window.showMsg("직원 데이터가 삭제되었습니다.");
            } else if (actionType === 'clearLogs') {
                state.logs = []; window.saveDataToStorage(); window.showMsg("수령 내역이 모두 삭제되었습니다.");
            } else if (actionType === 'clearInventory') {
                state.inventory = []; state.categories = ['기본분류']; state.activeCat = '기본분류'; state.selectedAdminItemId = null; window.saveDataToStorage(); window.showMsg("품목 및 분류가 모두 삭제되었습니다.");
            } else if (actionType === 'clearStaff') {
                state.staffList = []; window.saveDataToStorage(); window.showMsg("직원 명단이 모두 삭제되었습니다.");
            } else if (actionType === 'factoryReset') {
                localStorage.removeItem(STORAGE_KEY); window.location.reload();
            }

            window.renderApp();
        }
        window.executeConfirmAction = executeConfirmAction;

        // [수정됨] 키오스크 RFID 리더기 전용 이벤트 리스너 (한영키/속도 문제 보완)

            // 1. 입력창 포커스 시 무시
            if (document.activeElement && ['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) return;
            
            // 2. 모달창 활성화 시 무시
            if (state.authModal || state.pwdChangeModal || state.categoryModal || state.editingItem || state.transferModal || state.editingStaffItem || state.confirmModal || state.checkoutConfirmModal || state.stockAlertModal) return; 

            const currentTime = Date.now();
            
            // 3. 키 입력 간격이 50ms 이상이면 사람의 손 타이핑으로 간주하고 버퍼 초기화 (바코드/RFID 리더기는 10~20ms 이내로 매우 빠름)
            if (currentTime - lastKeyTime > 50) {
                tagBuffer = "";
            }
            lastKeyTime = currentTime;

            const key = e.key;
            if (key === 'Enter') { 
                e.preventDefault(); // 기본 Enter 동작(스크롤 이동 등) 방지
                if (tagBuffer.trim()) { 
                    window.simulateTag(tagBuffer.trim()); 
                    tagBuffer = ""; 
                } 
            } 
            // 4. 한글 입력 방지 및 영문/숫자만 수집 (e.code를 사용해 물리적 키보드 값 추출)
            else if (e.code && (e.code.startsWith('Key') || e.code.startsWith('Digit'))) { 
                tagBuffer += e.code.replace('Key', '').replace('Digit', ''); 
            }
        });

        function setCartInputQty(val) {
            if (!state.selectedItem) return;
            const item = state.selectedItem;
            const inCartItem = state.cart.find(c => c.itemId === item.id);
            const availableNow = (item.stocks.counter || 0) - (inCartItem ? inCartItem.amount : 0);
            
            let qty = parseInt(val) || 1;
            if (qty < 1) qty = 1;
            
            const multiplier = state.cartInputUnit === 'bulk' ? (item.bulkRatio || 1) : 1;
            const itemMaxReserve = item.maxReserveQty ?? 100;
            const maxAllowed = state.reserveMode ? Math.min(availableNow, itemMaxReserve) : availableNow;
            
            if (qty * multiplier > maxAllowed) {
                if (qty * multiplier > availableNow) {
                    window.showMsg("재고수량을 초과 하였습니다.");
                } else {
                    window.showMsg(`해당 품목의 예약 한도는 1인당 최대 ${itemMaxReserve}개입니다.`);
                }
                state.cartInputQty = Math.max(1, Math.floor(maxAllowed / multiplier));
            } else {
                state.cartInputQty = qty;
            }
            window.renderApp();
        }
        window.setCartInputQty = setCartInputQty;

            const addAmount = isBulk ? (qty * (item.bulkRatio || 1)) : qty;

            if(addAmount <= 0) return window.showMsg("수량을 1 이상 입력해주세요.");

        function addToCart(itemId, addAmount) {
            const item = state.inventory.find(i => i.id == itemId);
            const currentStock = item.stocks.counter || 0;
            const inCartItem = state.cart.find(c => c.itemId === itemId);
            const currentInCartQty = inCartItem ? inCartItem.amount : 0;
            
            const itemMaxReserve = item.maxReserveQty ?? 100;
            const maxAllowed = state.reserveMode ? Math.min(currentStock, itemMaxReserve) : currentStock;

            if (currentInCartQty + addAmount > maxAllowed) {
                if (currentInCartQty + addAmount > currentStock) {
                    return window.showMsg("재고수량을 초과 하였습니다.");
                } else {
                    return window.showMsg(`해당 품목의 예약 한도는 1인당 최대 ${itemMaxReserve}개입니다.`);
                }
            }
            
            if (inCartItem) { inCartItem.amount += addAmount; } 
            else { 
                state.cart.push({ itemId: item.id, itemName: item.name, unitBase: item.unitBase, unitBulk: item.unitBulk, bulkRatio: item.bulkRatio, amount: addAmount }); 
            }
            state.selectedItem = null; window.showMsg(`${item.name} 담기 완료`); window.renderApp();
        }
        window.addToCart = addToCart;

        function updateCartQty(itemId, delta) {
            const item = state.inventory.find(i => i.id == itemId);
            const currentStock = item.stocks.counter || 0;
            const cartItem = state.cart.find(c => c.itemId === itemId);
            
            if(cartItem) {
                const nextQty = cartItem.amount + delta;
                if(nextQty <= 0) return window.removeFromCart(itemId);
                
                const itemMaxReserve = item.maxReserveQty ?? 100;
                const maxAllowed = state.reserveMode ? Math.min(currentStock, itemMaxReserve) : currentStock;
                
                if(nextQty > maxAllowed) {
                    if (nextQty > currentStock) {
                        return window.showMsg("재고수량을 초과 하였습니다.");
                    } else {
                        return window.showMsg(`해당 품목의 예약 한도는 1인당 최대 ${itemMaxReserve}개입니다.`);
                    }
                }
                cartItem.amount = nextQty; window.renderApp();
            }
        }

        function executeCheckout() {
            state.checkoutConfirmModal = false;
            
            const rawDate = new Date().toISOString().split('T')[0];
            const timeStr = new Date().toLocaleTimeString('ko-KR', { hour12: false });
            
            const cartCopy = JSON.parse(JSON.stringify(state.cart));
            
            // 👇 [핵심 로직] 현장 오프라인 태그 수령일 때만 즉시 프린트!
            if (!state.reserveMode && window.printReceipt) {
                window.printReceipt(cartCopy, state.user, false);
            }

            if (state.reserveMode) {
                // 사전 예약 로직 (출력 없이 데이터만 저장)
                const reserveCart = state.cart.map(c => {
                    const realItem = state.inventory.find(i => i.id === c.itemId);
                    realItem.stocks.counter -= c.amount; 
                    const formatStr = window.formatStock(c.amount, c.unitBase, c.unitBulk, c.bulkRatio, false).replace(/<[^>]*>?/gm, ''); 
                    return { ...c, amountStr: formatStr };
                });
                
                state.reservations.unshift({
                    id: Date.now() + Math.random(),
                    rawDate,
                    time: timeStr,
                    staffId: state.user.id,
                    name: state.user.name,
                    brand: state.user.brand,
                    cart: reserveCart,
                    status: 'new' // 신규 예약은 '준비중' 상태
                });
                
                state.cart = []; window.saveDataToStorage(); 
                window.showMsg("사전 예약이 완료되었습니다! (익일 14시 이후 현장 수령)");
                setTimeout(() => { state.reserveMode = false; window.changeView('scan'); }, 3000);

            } else {
                // 오프라인 현장 수령 로직 (데이터 저장 및 로그 기록)
                state.cart.forEach(c => {
                    const realItem = state.inventory.find(i => i.id === c.itemId);
                    realItem.stocks.counter -= c.amount;
                    const formatStr = window.formatStock(c.amount, c.unitBase, c.unitBulk, c.bulkRatio, true).replace(/<[^>]*>?/gm, ''); 
                    
                    state.logs.unshift({
                        id: Date.now() + '_' + Math.random().toString(36).slice(2), rawDate, time: timeStr,
                        brand: state.user.brand, name: state.user.name, staffId: state.user.id,
                        itemName: c.itemName, amountStr: formatStr, qty: c.amount 
                    });
                });
                state.cart = []; window.saveDataToStorage(); window.showMsg("수령이 완료되었습니다!");
                setTimeout(() => window.changeView('scan'), 2000);
            }
            
            window.checkLowStockAndAlert(cartCopy);
        }

        function execTransfer() {
            const item = state.inventory.find(i => i.id == state.transferModal.itemId);
            const multiplier = state.transferModal.unitType === 'bulk' ? (item.bulkRatio || 1) : 1;
            const totalTransfer = (parseInt(document.getElementById('transQty').value) || 0) * multiplier;
            
            if((item.stocks[state.transferFrom] || 0) < totalTransfer) return window.showMsg("출발 창고 재고 부족");
            if(state.transferFrom === state.transferTo) return window.showMsg("동일 위치 이동 불가");
            if(totalTransfer <= 0) return window.showMsg("수량을 올바르게 입력하세요");
            
            item.stocks[state.transferFrom] -= totalTransfer;
            item.stocks[state.transferTo] = (item.stocks[state.transferTo] || 0) + totalTransfer;
            state.transferModal = null; window.saveDataToStorage(); window.showMsg("재고 이동 완료");

            const encodedUri = encodeURI(csvContent); const link = document.createElement("a");
            link.setAttribute("href", encodedUri); link.setAttribute("download", "warehouse_staff_list.csv");
            document.body.appendChild(link); link.click(); link.remove(); window.showMsg("엑셀 다운로드 완료");
        }
        window.exportStaffCSV = exportStaffCSV;

        function importStaffCSV(event) {
            const file = event.target.files[0]; if (!file) return;
            const parseCSV = function(text) {
                const lines = text.split('\n'); let count = 0;
                lines.forEach((line, index) => {
                    if (index === 0) return; 
                    const data = line.split(',').map(v => v.trim());
                    if (data.length >= 3 && data[1] && data[2] && !data[0].includes('예시)')) {
                        state.staffList.push({ brand: data[0].toUpperCase(), id: data[1].toUpperCase(), name: data[2].toUpperCase(), tagId: window.convertAccessControlID((data[3] || '임시-'+Math.random().toString(16).slice(2,6)).toUpperCase()) });
                        count++;
                    }
                });
                event.target.value = ''; window.saveDataToStorage(); window.showMsg(`엑셀을 통해 ${count}명 등록 완료`); window.renderApp();
            };
            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                if (text.includes('')) {
                    const readerEucKr = new FileReader();
                    readerEucKr.onload = function(e2) { parseCSV(e2.target.result); };
                    readerEucKr.readAsText(file, "euc-kr");
                } else { parseCSV(text); }
            };
            reader.readAsText(file, "utf-8");
        }

        function getStats() {
            const filtered = state.logs.filter(log => (log.rawDate >= state.startDate && log.rawDate <= state.endDate) && (state.filterItem === "전체" || log.itemName === state.filterItem));
            const summary = {};
            filtered.forEach(log => {
                const key = state.filterItem === "전체" ? log.itemName : log.brand;
                summary[key] = (summary[key] || 0) + log.qty;
            });
            const statsData = Object.entries(summary).map(([label, value]) => ({ label, value })).sort((a,b) => b.value - a.value).slice(0,5);
            const maxVal = statsData.length ? Math.max(...statsData.map(d=>d.value)) : 1;
            return { filtered, statsData, maxVal };
        }

        async function initFirebase() {
            try {
                if (firebaseConfig.apiKey && firebaseConfig.apiKey !== "YOUR_API_KEY") {
                    app = initializeApp(firebaseConfig);
                    auth = getAuth(app);
                    db = getFirestore(app);
                    
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                    
                    onAuthStateChanged(auth, (user) => {
                        authUser = user;
                        if (!user) return;
                        docRef = doc(db, "artifacts", appId, "public", "data", "store_data", "main_state");
                        onSnapshot(docRef, (docSnap) => {
                            if (docSnap.exists()) {
                                const parsed = docSnap.data();
                                state.adminPassword = parsed.adminPassword || initialState.adminPassword;
                                state.warehouses = parsed.warehouses || initialState.warehouses;
                                state.staffList = parsed.staffList || [];
                                state.categories = parsed.categories || initialState.categories;
                                state.inventory = parsed.inventory || initialState.inventory;
                                state.logs = parsed.logs || [];
                                state.reservations = parsed.reservations || [];
                                state.settings = parsed.settings || initialState.settings;
                            } else {
                                window.saveDataToStorage();
                            }
                            isFirebaseActive = true;
                            if (document.activeElement && ['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) {
                                console.log("입력 중 렌더링 보류");
                            } else {
                                window.renderApp();
                            }
                        }, (error) => {
                            console.error("Firestore Error:", error);
                        });
                    });
                }
            } catch(e) {
                console.error("Firebase Init Error:", e);
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initFirebase);
        } else {

        function renderAdminReservations() {
            const filterStatus = window.state.reserveFilterStatus || '전체';
            const filtered = window.state.reservations.filter(r => filterStatus === '전체' || r.status === filterStatus);
            
            // 배지(상태창) 폰트와 패딩 축소
            const getStatusHtml = (status) => {
                if(status === 'new') return `<span class="bg-white border-2 border-blue-500 text-blue-600 px-3 py-1 rounded-full text-sm font-bold whitespace-nowrap">신규(준비중)</span>`;
                if(status === 'pending') return `<span class="bg-amber-100 text-amber-600 px-3 py-1 rounded-full text-sm font-bold whitespace-nowrap">현장 대기</span>`;
                if(status === 'completed') return `<span class="bg-blue-100 text-blue-600 px-3 py-1 rounded-full text-sm font-bold whitespace-nowrap">수령 완료</span>`;
                if(status === 'cancelled') return `<span class="bg-red-100 text-red-600 px-3 py-1 rounded-full text-sm font-bold whitespace-nowrap">취소됨</span>`;
                return status;
            }

            return `
            <div class="flex flex-col gap-10">
                <div class="bg-white p-6 lg:p-12 rounded-[4rem] border-4 border-slate-200 flex flex-col gap-8 shadow-lg">
                    <div class="flex flex-wrap justify-between items-center border-b-4 border-slate-200 pb-6 gap-4">
                        <h3 class="text-3xl lg:text-4xl text-slate-800 border-l-[10px] border-blue-500 pl-4 uppercase tracking-widest italic font-black word-keep">📅 예약 종합 관리</h3>
                        <div class="flex flex-wrap gap-2">
                            <button onclick="window.changeReserveFilter('전체')" class="px-4 py-2 rounded-xl text-sm lg:text-base font-bold tap-effect ${filterStatus==='전체'?'bg-slate-800 text-white':'bg-slate-100 text-slate-500'}">전체</button>
                            <button onclick="window.changeReserveFilter('new')" class="px-4 py-2 rounded-xl text-sm lg:text-base font-bold tap-effect ${filterStatus==='new'?'bg-blue-600 text-white':'bg-slate-100 text-slate-500'}">신규</button>
                            <button onclick="window.changeReserveFilter('pending')" class="px-4 py-2 rounded-xl text-sm lg:text-base font-bold tap-effect ${filterStatus==='pending'?'bg-amber-500 text-white':'bg-slate-100 text-slate-500'}">대기</button>
                            <button onclick="window.changeReserveFilter('completed')" class="px-4 py-2 rounded-xl text-sm lg:text-base font-bold tap-effect ${filterStatus==='completed'?'bg-slate-600 text-white':'bg-slate-100 text-slate-500'}">완료</button>
                            <button onclick="window.changeReserveFilter('cancelled')" class="px-4 py-2 rounded-xl text-sm lg:text-base font-bold tap-effect ${filterStatus==='cancelled'?'bg-red-600 text-white':'bg-slate-100 text-slate-500'}">취소</button>
                        </div>
                    </div>
                    
                    <div class="overflow-x-auto rounded-[2rem] border-4 border-slate-300 shadow-sm">
                        <table class="excel-table w-full">
                            <thead>
                                <tr>
                                    <th style="padding: 1rem 0.5rem; font-size: 1.1rem; white-space: nowrap;">일시</th>
                                    <th style="padding: 1rem 0.5rem; font-size: 1.1rem; white-space: nowrap;">사용자</th>
                                    <th style="padding: 1rem 0.5rem; font-size: 1.1rem; white-space: nowrap;">내역</th>
                                    <th style="padding: 1rem 0.5rem; font-size: 1.1rem; white-space: nowrap;">상태</th>
                                    <th style="padding: 1rem 0.5rem; font-size: 1.1rem; white-space: nowrap;">관리</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${filtered.map(r => `
                                <tr>
                                    <td style="padding: 1rem 0.5rem; font-size: 1.1rem; white-space: normal; line-height: 1.3;">
                                        <span class="text-xs text-slate-400 block">${r.rawDate}</span><span class="font-bold text-slate-700">${r.time}</span>
                                    </td>
                                    <td style="padding: 1rem 0.5rem; font-size: 1.1rem; white-space: normal; line-height: 1.3; word-break: break-all;">
                                        <div class="font-bold text-slate-800">${r.name}</div>
                                        <div class="text-sm text-slate-500 mt-1">${r.brand}<br/>${r.staffId}</div>
                                    </td>
                                    <td style="padding: 1rem 0.5rem; font-size: 1.1rem; text-align: left; white-space: normal; line-height: 1.4;">
                                        ${r.cart.map(c => `<div class="mb-1 border-b border-slate-100 pb-1 last:border-0 word-keep text-sm lg:text-base">- ${c.itemName} <strong class="text-blue-500 ml-1">${window.formatStock(c.amount, c.unitBase, c.unitBulk, c.bulkRatio, false)}</strong></div>`).join('')}
                                    </td>
                                    <td style="padding: 1rem 0.5rem;">${getStatusHtml(r.status)}</td>
                                    <td style="padding: 1rem 0.5rem;">
                                        <div class="flex flex-col gap-2 items-center">
                                        ${r.status === 'new' ? `
                                            <button onclick="window.printAndReadyReservation('${r.id}')" class="bg-blue-50 text-blue-600 text-sm px-3 py-2 rounded-lg tap-effect border border-blue-200 font-bold hover:bg-blue-100 w-full whitespace-nowrap">🖨️ 출력/준비</button> 
                                            <button onclick="window.cancelReservation('${r.id}')" class="bg-red-50 text-red-600 text-sm px-3 py-2 rounded-lg tap-effect border border-red-200 font-bold hover:bg-red-100 w-full whitespace-nowrap">취소</button>
                                        ` : ''}
                                        ${r.status === 'pending' ? `<button onclick="window.cancelReservation('${r.id}')" class="bg-red-50 text-red-600 text-sm px-3 py-2 rounded-lg tap-effect border border-red-200 font-bold hover:bg-red-100 w-full whitespace-nowrap">강제 취소</button>` : ''}
                                        ${r.status === 'completed' || r.status === 'cancelled' ? '-' : ''}
                                        </div>
                                    </td>
                                </tr>`).join('')}
                                ${filtered.length===0 ? `<tr><td colspan="5" class="text-center py-16 text-slate-400 word-keep">예약 기록이 없습니다.</td></tr>`:''}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>`;
        }

        function renderAdminSettings() {

                    <h3 class="text-4xl text-red-800 border-l-[10px] border-red-500 pl-6 uppercase tracking-widest italic font-black word-keep">데이터 강제 초기화 구역</h3>

                        <button onclick="window.clearAllInventory()" class="bg-white border-4 border-red-300 text-red-600 py-8 rounded-[3rem] text-3xl tap-effect font-bold shadow-sm hover:bg-red-100 whitespace-nowrap mt-4">📦 품목 및 분류 전체 삭제</button>
                        <button onclick="window.clearAllStaff()" class="bg-white border-4 border-red-300 text-red-600 py-8 rounded-[3rem] text-3xl tap-effect font-bold shadow-sm hover:bg-red-100 whitespace-nowrap">👥 직원 명단 전체 삭제</button>

        // [신규] 감열지 영수증 프린터 출력용 함수
        function printReceipt(cart, user, isReserve) {
            // 현재 시간 생성
            const dateStr = new Date().toLocaleString('ko-KR');
            let itemsHtml = '';
            let totalQty = 0;
            
            // 장바구니 내역을 표(Table) 형태의 HTML로 변환
            cart.forEach(c => {
                itemsHtml += `
                    <tr>
                        <td style="text-align: left; padding: 4px 0; font-size: 14px; word-break: keep-all;">${c.itemName}</td>
                        <td style="text-align: right; font-size: 14px;">${c.amount}${c.unitBase}</td>
                    </tr>
                `;
                totalQty += c.amount;
            });

            // 감열지 프린터용 (가로 80mm 기준) 영수증 HTML 템플릿
            const printContent = `
                <!DOCTYPE html>
                <html>
                <head>
                    <title>영수증</title>
                    <style>
                        @page { margin: 0; } /* 용지 여백 제거 */
                        body { 
                            font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; 
                            width: 270px; /* 80mm 프린터 기준 (58mm 프린터인 경우 200px 정도로 줄이세요) */
                            margin: 0 auto; 
                            padding: 10px; 
                            color: #000;
                        }
                        .header { text-align: center; border-bottom: 2px dashed #000; padding-bottom: 10px; margin-bottom: 10px; }
                        .title { font-size: 22px; font-weight: bold; margin: 0; }
                        table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
                        th { border-bottom: 1px solid #000; padding: 4px 0; text-align: left; font-size: 14px;}
                        .footer { text-align: center; border-top: 2px dashed #000; padding-top: 10px; margin-top: 10px; font-size: 12px; }
                    </style>
                </head>
                <body>
                    <div class="header">
                        <h2 class="title">[ 창고 출고 ${isReserve ? '예약증' : '영수증'} ]</h2>
                        <p style="margin: 5px 0 0 0; font-size: 12px;">${dateStr}</p>
                    </div>
                    <div style="margin-bottom: 10px; font-size: 14px;">
                        <strong>출고자:</strong> ${user.brand} / ${user.name} <br>
                        <strong>사 번:</strong> ${user.id}
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>품목명</th>
                                <th style="text-align: right;">수량</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${itemsHtml}
                        </tbody>
                    </table>
                    <div style="text-align: right; font-weight: bold; font-size: 16px;">
                        총 합계: ${totalQty} 개
                    </div>
                    <div class="footer">
                        서명: ___________________<br><br>
                        출고가 완료되었습니다.
                    </div>
                </body>
                </html>
            `;

            // 보이지 않는 iframe을 생성하여 그 안에서 인쇄 실행
            const printFrame = document.createElement('iframe');
            printFrame.style.position = 'fixed';
            printFrame.style.right = '0';
            printFrame.style.bottom = '0';
            printFrame.style.width = '0';
            printFrame.style.height = '0';
            printFrame.style.border = '0';
            document.body.appendChild(printFrame);

            const doc = printFrame.contentWindow.document;
            doc.open();
            doc.write(printContent);
            doc.close();

            // 내용이 로드될 시간을 짧게 준 뒤 인쇄 호출
            setTimeout(() => {
                printFrame.contentWindow.focus();
                printFrame.contentWindow.print();
                // 인쇄 다이얼로그가 닫히면 iframe 제거
                setTimeout(() => document.body.removeChild(printFrame), 1000);
            }, 300);
        }

                        <h2 class="text-5xl font-black text-slate-800 mb-4 border-b-4 border-blue-100 pb-6 word-keep">직원 정보 수정</h2>
                        <div class="flex flex-col gap-6">
                            <div class="flex flex-col gap-2"><label class="text-xl text-slate-500 ml-4 whitespace-nowrap">소속 브랜드</label><input id="editStaffBrand" value="${s.brand}" class="input-standard uppercase-input"></div>
                            <div class="flex flex-col gap-2"><label class="text-xl text-slate-500 ml-4 whitespace-nowrap">사번</label><input id="editStaffId" value="${s.id}" class="input-standard uppercase-input"></div>
                            <div class="flex flex-col gap-2"><label class="text-xl text-slate-500 ml-4 whitespace-nowrap">이름</label><input id="editStaffName" value="${s.name}" class="input-standard uppercase-input"></div>
                            <div class="flex flex-col gap-2"><label class="text-xl text-slate-500 ml-4 whitespace-nowrap">카드번호 (Tag ID)</label><input id="editStaffTag" value="${s.tagId}" class="input-standard uppercase-input"></div>
                        </div>
                        <div class="flex gap-4 mt-6 shrink-0">
                            <button onclick="window.state.editingStaffItem=null; window.renderApp();" class="flex-1 py-8 bg-slate-100 rounded-full text-3xl text-slate-600 tap-effect whitespace-nowrap">취소</button>
                            <button onclick="window.saveStaffEdit()" class="flex-[2] py-8 bg-blue-600 text-white rounded-full text-3xl tap-effect whitespace-nowrap">정보 업데이트</button>
                        </div>
                    </div>
                </div>`;
            }
            if (window.state.selectedItem && !window.state.confirmModal && !window.state.checkoutConfirmModal) {
                const item = window.state.selectedItem;
                const inCartItem = window.state.cart.find(c => c.itemId === item.id);
                const availableNow = (item.stocks.counter || 0) - (inCartItem ? inCartItem.amount : 0);
                const isSoldOut = availableNow <= 0;
                
                html += `
                <div class="modal-overlay fade-in">
                    <div class="bg-white w-full max-w-[1000px] rounded-[6rem] p-16 shadow-2xl border-[20px] border-blue-600 flex flex-col relative overflow-hidden">
                        <div class="absolute top-0 right-0 w-[400px] h-[400px] bg-blue-50 rounded-full opacity-50 blur-3xl" style="transform: translate(30%, -30%);"></div>
                        <div class="flex justify-between items-start mb-12 relative z-10 px-4">
                            <div class="flex flex-col gap-4">
                                <div class="inline-block bg-blue-600 text-white px-8 py-3 rounded-full text-2xl uppercase tracking-widest shadow-lg italic w-max whitespace-nowrap">${window.state.reserveMode ? '사전 예약 진행 중' : '수령 진행 중'}</div>
                                <h2 class="text-6xl italic tracking-tighter text-slate-800 word-keep">[${item.name}]</h2>
                            </div>
                            <button onclick="window.closeItemModal()" class="text-slate-300 text-7xl tap-effect">✕</button>
                        </div>
                        <div class="flex flex-col gap-8 relative z-10 overflow-y-auto custom-scroll">
                            <div class="bg-slate-50 p-10 rounded-[3rem] border-4 border-slate-200 shadow-inner">
                                <div class="flex justify-between items-end mb-8 px-4 border-b-4 border-slate-200 pb-6">
                                    <div class="flex flex-col gap-1 w-[55%] pr-2">
                                        <span class="text-xl text-slate-400 uppercase tracking-widest italic whitespace-nowrap">단위 정보</span>
                                        <span class="text-2xl italic text-blue-600 word-keep leading-snug font-bold">
                                            기본(${item.unitBase})
                                            ${item.unitBulk ? `<br/><span class="text-slate-500 text-xl mt-1 inline-block">묶음(${item.unitBulk}, 1${item.unitBulk}=${item.bulkRatio})</span>` : ''}
                                        </span>
                                    </div>
                                    <div class="flex flex-col gap-1 text-right w-[45%] items-end pl-2 border-l-2 border-slate-200">
                                        <span class="text-xl text-slate-400 uppercase tracking-widest italic whitespace-nowrap">현재 잔고</span>
                                        <span class="text-3xl italic uppercase whitespace-nowrap ${isSoldOut?'text-red-500':'text-slate-700'} font-black">${isSoldOut ? '품절' : window.formatStock(availableNow, item.unitBase, item.unitBulk, item.bulkRatio)}</span>
                                    </div>
                                </div>
                                <div class="flex flex-col gap-6 px-2">
                                    <div class="flex items-center gap-4">
                                        <select onchange="window.changeCartInputUnit(this.value)" class="bg-white border-4 border-slate-300 px-6 rounded-[2rem] text-3xl outline-none font-bold shadow-sm" style="height: 5.5rem;">
                                            <option value="base" ${window.state.cartInputUnit==='base'?'selected':''}>기본 (${item.unitBase})</option>
                                            ${item.unitBulk && item.bulkRatio > 1 ? `<option value="bulk" ${window.state.cartInputUnit==='bulk'?'selected':''}>묶음 (${item.unitBulk})</option>` : ''}
                                        </select>
                                        <div class="flex items-center bg-white border-4 border-slate-300 rounded-[2rem] p-2 flex-1 shadow-sm" style="height: 5.5rem;">
                                            <button onclick="if(window.state.cartInputQty>1){window.changeCartInputQty(-1);}" class="w-14 h-14 bg-slate-100 rounded-2xl text-4xl tap-effect flex items-center justify-center text-slate-500 font-bold">-</button>
                                            <input type="number" value="${window.state.cartInputQty}" onchange="window.setCartInputQty(this.value)" class="text-4xl tabular-nums text-center bg-transparent outline-none font-black text-slate-800 flex-1 w-full" style="border:none; box-shadow:none;" />
                                            <button onclick="window.changeCartInputQty(1)" class="w-14 h-14 bg-slate-100 rounded-2xl text-4xl tap-effect flex items-center justify-center text-slate-500 font-bold">+</button>
                                        </div>
                                    </div>
                                    <button onclick="window.confirmAddToCart()" class="bg-blue-600 text-white py-6 rounded-[3rem] text-4xl tap-effect shadow-xl font-bold tracking-widest flex flex-col items-center justify-center gap-2 ${isSoldOut?'grayscale':''}" ${isSoldOut?'disabled':''}>
                                        <span>${window.state.reserveMode ? '예약 바구니 담기' : '장바구니 담기'}</span>
                                        <span class="text-xl text-blue-200 font-normal tracking-normal truncate w-full px-4 text-center">담길 총량: ${window.state.cartInputUnit === 'bulk' ? (window.state.cartInputQty * (item.bulkRatio || 1)) : window.state.cartInputQty}${item.unitBase} ${item.unitBulk && item.bulkRatio > 1 ? `(${window.formatStock(window.state.cartInputUnit === 'bulk' ? (window.state.cartInputQty * (item.bulkRatio || 1)) : window.state.cartInputQty, item.unitBase, item.unitBulk, item.bulkRatio, true)})` : ''}</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <button onclick="window.closeItemModal()" class="mt-8 shrink-0 w-full py-12 text-slate-500 border-8 border-dashed border-slate-300 rounded-[5rem] text-4xl uppercase tracking-widest tap-effect bg-slate-50 relative z-10 whitespace-nowrap">취소하고 돌아가기</button>
                    </div>
                </div>`;
            }
            if (window.state.categoryModal && !window.state.confirmModal) {
                html += `
                <div class="modal-overlay fade-in">
                    <div class="bg-white w-full max-w-[800px] rounded-[5rem] p-16 border-8 border-blue-500 shadow-2xl flex flex-col">
                        <h2 class="text-6xl mb-12 italic border-b-8 border-blue-100 pb-8 text-slate-800 word-keep">[${window.state.categoryModal.mode==='add'?'분류 신규 추가':'분류 명칭 수정'}]</h2>
                        <div class="flex flex-col gap-12 overflow-y-auto custom-scroll">
                            <div class="flex flex-col gap-4"><label class="text-3xl text-slate-500 ml-6 italic whitespace-nowrap">분류 이름</label><input id="catInput" class="input-standard" value="${window.state.categoryInputValue}" placeholder="분류명을 입력하세요"></div>
                            <div class="flex gap-6 mt-8 shrink-0">
                                <button onclick="window.state.categoryModal=null; window.renderApp();" class="flex-1 py-10 bg-slate-100 rounded-full text-4xl text-slate-600 border-4 border-slate-200 tap-effect whitespace-nowrap">취소</button>
                                <button onclick="window.saveCategory()" class="flex-[2] py-10 bg-blue-600 text-white rounded-full text-4xl shadow-2xl tap-effect whitespace-nowrap">저장하기</button>
                            </div>
                        </div>
                    </div>
                </div>`;
            }
            if (window.state.editingItem && !window.state.confirmModal) {
                html += `
                <div class="modal-overlay fade-in">
                    <div class="bg-white w-full max-w-[900px] rounded-[5rem] p-16 border-8 border-amber-500 shadow-2xl flex flex-col max-h-[90vh]">
                        <h2 class="text-6xl mb-12 italic border-b-8 border-amber-100 pb-8 text-slate-800 shrink-0 word-keep">[${window.state.isAddingNew?'품목 신규 등록':'품목 정보 수정'}]</h2>
                        <div class="flex flex-col gap-8 overflow-y-auto custom-scroll pr-4 mb-8">
                            <div class="flex flex-col gap-2"><label class="text-2xl text-slate-500 ml-4 font-bold">품목 정식 명칭</label><input id="editName" class="input-standard" value="${window.state.editingItem.name}" placeholder="품목 명칭 입력"></div>
                            <div class="grid grid-cols-2 gap-6">
                                <div class="flex flex-col gap-2"><label class="text-2xl text-slate-500 ml-4 font-bold">기본 단위(낱개) <span class="text-red-500">*</span></label><input id="editUnitBase" class="input-standard" value="${window.state.editingItem.unitBase}" placeholder="예: 개, 장, 부"></div>
                                <div class="flex flex-col gap-2"><label class="text-2xl text-slate-500 ml-4 font-bold">묶음 단위(박스) (선택)</label><input id="editUnitBulk" class="input-standard" value="${window.state.editingItem.unitBulk}" placeholder="예: 박스, 묶음"></div>
                            </div>
                            <div class="flex flex-col gap-2"><label class="text-2xl text-slate-500 ml-4 font-bold">1묶음당 기본 수량 비율 (비묶음품목은 1)</label><input type="number" id="editBulkRatio" class="input-standard uppercase-input" value="${window.state.editingItem.bulkRatio}" placeholder="예: 50"></div>
                            
                            <div class="grid grid-cols-2 gap-6 mt-4 p-6 bg-slate-50 rounded-[2rem] border-4 border-slate-200">
                                <div class="flex flex-col gap-2"><label class="text-2xl text-slate-500 ml-4 font-bold">1인당 예약 한도 (기본단위)</label><input type="number" id="editMaxReserveQty" class="input-standard uppercase-input bg-white" value="${window.state.editingItem.maxReserveQty ?? 100}"></div>
                                <div class="flex flex-col gap-2"><label class="text-2xl text-slate-500 ml-4 font-bold">발주 알림 수량 (총재고 기준)</label><input type="number" id="editAlertQty" class="input-standard uppercase-input bg-white" value="${window.state.editingItem.alertQty ?? 10}"></div>
                            </div>
                        </div>
                        <div class="flex gap-6 shrink-0 mt-auto">
                            <button onclick="window.closeEditItem()" class="flex-1 py-10 bg-slate-100 rounded-full text-4xl text-slate-600 border-4 border-slate-200 tap-effect whitespace-nowrap">취소</button>
                            <button onclick="window.saveItem()" class="flex-[2] py-10 bg-amber-500 text-white rounded-full text-4xl shadow-2xl tap-effect whitespace-nowrap">저장하기</button>
                        </div>
                    </div>
                </div>`;
            }
            if (window.state.transferModal && !window.state.confirmModal) {
                const item = window.state.inventory.find(i=>i.id == window.state.transferModal.itemId);
                if (item) {
                    html += `
                    <div class="modal-overlay fade-in">
                        <div class="bg-white w-full max-w-[900px] rounded-[5rem] p-16 border-8 border-blue-500 shadow-2xl flex flex-col max-h-[90vh]">
                            <h2 class="text-6xl mb-12 italic border-b-8 border-blue-100 pb-8 text-slate-800 word-keep shrink-0">[${item.name}] 재고 이동</h2>
                            <div class="flex flex-col gap-12 overflow-y-auto custom-scroll mb-8">
                                <div class="grid grid-cols-2 gap-8">
                                    <div class="flex flex-col gap-4"><label class="text-3xl text-slate-500 ml-6 whitespace-nowrap">출발 창고</label>
                                        <select id="transFrom" onchange="window.state.transferFrom=this.value" class="input-standard appearance-none">
                                            ${Object.entries(window.state.warehouses).map(([k,v])=>`<option value="${k}" ${window.state.transferFrom===k?'selected':''}>${v}</option>`).join('')}
                                        </select>
                                    </div>
                                    <div class="flex flex-col gap-4"><label class="text-3xl text-slate-500 ml-6 whitespace-nowrap">도착 창고</label>
                                        <select id="transTo" onchange="window.state.transferTo=this.value" class="input-standard appearance-none">
                                            ${Object.entries(window.state.warehouses).map(([k,v])=>`<option value="${k}" ${window.state.transferTo===k?'selected':''}>${v}</option>`).join('')}
                                        </select>
                                    </div>
                                </div>
                                <div class="flex flex-col gap-4">
                                    <div class="flex justify-between items-center">
                                        <label class="text-3xl text-slate-500 ml-6 whitespace-nowrap">이동 단위 및 수량</label>
                                        <select onchange="window.state.transferModal.unitType=this.value" class="bg-slate-100 p-4 rounded-2xl text-2xl outline-none font-bold border-4 border-slate-200">
                                            <option value="base" ${window.state.transferModal.unitType==='base'?'selected':''}>기본 단위 (${item.unitBase})</option>
                                            ${item.unitBulk && item.bulkRatio > 1 ? `<option value="bulk" ${window.state.transferModal.unitType==='bulk'?'selected':''}>묶음 단위 (${item.unitBulk})</option>` : ''}
                                        </select>
                                    </div>
                                    <div class="flex items-center gap-6">
                                        <input type="number" id="transQty" value="${window.state.transferQty}" onchange="window.state.transferQty=parseInt(this.value)||1" class="input-standard flex-1">
                                        <div class="flex gap-4">
                                            ${[1,10,50,100].map(n=>`<button onclick="window.state.transferQty+=${n}; document.getElementById('transQty').value=window.state.transferQty;" class="bg-slate-100 px-8 py-6 rounded-3xl text-3xl tap-effect text-slate-600 whitespace-nowrap">+${n}</button>`).join('')}
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="flex gap-6 shrink-0 mt-auto">
                                <button onclick="window.state.transferModal=null; window.renderApp();" class="flex-1 py-10 bg-slate-100 rounded-full text-4xl text-slate-600 border-4 border-slate-200 tap-effect whitespace-nowrap">취소</button>
                                <button onclick="window.execTransfer()" class="flex-[2] py-10 bg-blue-600 text-white rounded-full text-4xl shadow-2xl tap-effect whitespace-nowrap">이동 실행</button>
                            </div>
                        </div>
                    </div>`;
                }
            }
            return html;
        }

    </script>
</body>
</html>
